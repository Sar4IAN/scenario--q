<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>店舗レイアウトエディター</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f0f0f0; }
        /* サイドバー（編集パネル） */
        #toolbar { width: 300px; padding: 20px; background: #fff; border-right: 1px solid #ccc; height: 100vh; }
        /* キャンバス（店の床） */
        #canvas { position: relative; flex-grow: 1; height: 100vh; overflow: auto; padding: 50px; }
        .shop-floor { 
            background: #fff; border: 2px solid #333; position: relative; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: 0.2s;
        }
        /* 編集可能なオブジェクト共通設定 */
        .object { 
            position: absolute; border: 2px solid #444; 
            display: flex; align-items: center; justify-content: center;
            cursor: move; background: rgba(100, 150, 250, 0.5); font-size: 12px;
        }
        .object.selected { outline: 3px solid #ff4757; background: rgba(255, 71, 87, 0.3); }
        .window { background: rgba(135, 206, 235, 0.7); border: 2px solid #fff; }
        
        .control-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }
    </style>
</head>
<body>

<div id="toolbar">
    <h3>編集パネル</h3>
    <p id="target-name">オブジェクトを選択してください</p>
    <hr>
    <div class="control-group">
        <label>幅 (Width)</label>
        <input type="range" id="width-slider" min="10" max="800">
    </div>
    <div class="control-group">
        <label>高さ (Height)</label>
        <input type="range" id="height-slider" min="10" max="800">
    </div>
    <div class="control-group">
        <label>回転 (Rotation)</label>
        <input type="range" id="rotate-slider" min="0" max="360" value="0">
    </div>
    <hr>
    <button onclick="addObject('table')">机を追加</button>
    <button onclick="addObject('window')">窓を追加</button>
</div>

<div id="canvas">
    <div id="shop" class="shop-floor object" style="width: 500px; height: 400px; top: 50px; left: 50px;">
        店のエリア (Shop)
    </div>
</div>

<script>
let selectedElement = null;

// 要素を選択する処理
document.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('object')) {
        if (selectedElement) selectedElement.classList.remove('selected');
        selectedElement = e.target;
        selectedElement.classList.add('selected');
        
        document.getElementById('target-name').innerText = "編集中: " + selectedElement.innerText.split('\n')[0];
        
        // 現在の値をスライダーに反映
        document.getElementById('width-slider').value = parseInt(selectedElement.style.width);
        document.getElementById('height-slider').value = parseInt(selectedElement.style.height);
        const transform = selectedElement.style.transform;
        const match = transform.match(/rotate\((\d+)deg\)/);
        document.getElementById('rotate-slider').value = match ? match[1] : 0;
    }
});

// スライダーで編集する処理
document.getElementById('width-slider').oninput = function() {
    if (selectedElement) selectedElement.style.width = this.value + 'px';
};
document.getElementById('height-slider').oninput = function() {
    if (selectedElement) selectedElement.style.height = this.value + 'px';
};
document.getElementById('rotate-slider').oninput = function() {
    if (selectedElement) selectedElement.style.transform = `rotate(${this.value}deg)`;
};

// オブジェクトの追加
function addObject(type) {
    const newObj = document.createElement('div');
    newObj.className = `object ${type === 'window' ? 'window' : ''}`;
    newObj.style.width = '80px';
    newObj.style.height = '50px';
    newObj.style.top = '20px';
    newObj.style.left = '20px';
    newObj.innerText = type === 'window' ? '窓' : '机';
    document.getElementById('shop').appendChild(newObj);
}

// 簡易ドラッグ処理
let isDragging = false;
document.addEventListener('mousedown', (e) => { if(e.target !== document.getElementById('shop') && e.target.classList.contains('object')) isDragging = true; });
document.addEventListener('mousemove', (e) => {
    if (isDragging && selectedElement && selectedElement !== document.getElementById('shop')) {
        const parentRect = document.getElementById('shop').getBoundingClientRect();
        selectedElement.style.left = (e.clientX - parentRect.left - parseInt(selectedElement.style.width)/2) + 'px';
        selectedElement.style.top = (e.clientY - parentRect.top - parseInt(selectedElement.style.height)/2) + 'px';
    }
});
document.addEventListener('mouseup', () => isDragging = false);

</script>
</body>
</html>
